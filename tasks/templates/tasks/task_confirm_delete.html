{% extends "tasks/base.html" %}

{% block title %}Delete Task · Hangarin{% endblock %}

{% block content %}
<div class="card">
  <div class="card-body">
    <h1 class="h5">Delete Task</h1>
    <p>Are you sure you want to delete <strong>{{ object.title }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'tasks:task_detail' object.pk %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
