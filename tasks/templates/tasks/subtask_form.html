{% extends "tasks/base.html" %}

{% block title %}Add subtask · Hangarin{% endblock %}

{% block content %}
<div class="card">
  <div class="card-body">
    <h1 class="h5">Add a subtask</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.non_field_errors }}

      {% for field in form %}
        <div class="mb-3">
          <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% for error in field.errors %}
            <div class="text-danger small">{{ error }}</div>
          {% endfor %}
        </div>
      {% endfor %}

      <div class="d-flex justify-content-between">
        <a href="{% url 'tasks:task_detail' view.kwargs.task_pk %}" class="btn btn-outline-success">Back</a>
        <button type="submit" class="btn btn-success">Add subtask</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
